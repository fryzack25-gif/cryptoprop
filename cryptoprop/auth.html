<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoProp • Sign in</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container" style="max-width:520px; margin:40px auto;">
    <div class="card glass" style="padding:18px;">
      <h1 style="margin:0 0 8px 0;">CryptoProp</h1>
      <p class="muted small" style="margin-top:0;">Create an account or sign in to continue.</p>
      <a href="/" style="display:inline-block; margin-bottom:4px; font-size:12px; color:var(--accent,#7c5cff); text-decoration:none;">&larr; Back to home</a>

      <div style="display:flex; gap:10px; margin-top:14px;">
        <button class="btn primary" id="tabLogin" type="button">Login</button>
        <button class="btn" id="tabSignup" type="button">Sign up</button>
      </div>

      <!-- Login box -->
      <div id="loginBox" style="margin-top:14px;">
        <label class="tiny muted">Email</label>
        <input class="input" id="loginEmail" placeholder="you@email.com" />
        <label class="tiny muted" style="margin-top:10px;">Password</label>
        <div style="position:relative; display:flex; align-items:center;">
          <input class="input" id="loginPass" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" style="width:100%; padding-right:40px;" />
          <button type="button" onclick="toggleVis('loginPass', this)" style="position:absolute; right:10px; background:none; border:none; cursor:pointer; color:var(--muted,#aaa); font-size:16px;">&#128065;</button>
        </div>
        <button class="btn primary" id="loginBtn" style="margin-top:12px; width:100%;">Login</button>
        <div style="text-align:right; margin-top:8px;">
          <a href="#" id="forgotLink" class="tiny muted" style="color:var(--accent,#7c5cff); text-decoration:none; font-size:12px;">Forgot password?</a>
        </div>
        <div class="tiny muted" id="loginMsg" style="margin-top:10px;"></div>
      </div>

      <!-- Forgot password box -->
      <div id="forgotBox" style="margin-top:14px; display:none;">
        <p class="muted small" style="margin:0 0 10px;">Enter your email and we'll send you a reset link.</p>
        <label class="tiny muted">Email</label>
        <input class="input" id="forgotEmail" placeholder="you@email.com" />
        <button class="btn primary" id="forgotBtn" style="margin-top:12px; width:100%;">Send reset link</button>
        <div class="tiny muted" id="forgotMsg" style="margin-top:10px;"></div>
        <div style="margin-top:10px;">
          <a href="#" id="backToLogin" class="tiny muted" style="color:var(--accent,#7c5cff); text-decoration:none; font-size:12px;">&larr; Back to login</a>
        </div>
      </div>

      <!-- Sign up box -->
      <div id="signupBox" style="margin-top:14px; display:none;">
        <label class="tiny muted">Email</label>
        <input class="input" id="signupEmail" placeholder="you@email.com" />
        <label class="tiny muted" style="margin-top:10px;">Password (min 8 chars)</label>
        <div style="position:relative; display:flex; align-items:center;">
          <input class="input" id="signupPass" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" style="width:100%; padding-right:40px;" />
          <button type="button" onclick="toggleVis('signupPass', this)" style="position:absolute; right:10px; background:none; border:none; cursor:pointer; color:var(--muted,#aaa); font-size:16px;">&#128065;</button>
        </div>
        <label class="tiny muted" style="margin-top:10px;">Confirm password</label>
        <div style="position:relative; display:flex; align-items:center;">
          <input class="input" id="signupConfirm" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" style="width:100%; padding-right:40px;" />
          <button type="button" onclick="toggleVis('signupConfirm', this)" style="position:absolute; right:10px; background:none; border:none; cursor:pointer; color:var(--muted,#aaa); font-size:16px;">&#128065;</button>
        </div>
        <div style="margin-top:14px; padding:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:8px;">
          <label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer; font-size:11px; color:var(--muted,#aaa); line-height:1.6;">
            <input type="checkbox" id="termsCheck" style="margin-top:2px; accent-color:#00e5a0; width:14px; height:14px; flex-shrink:0;" />
            <span>
              I have read and agree to the
              <a href="/legal.html#terms" target="_blank" style="color:#00e5a0; text-decoration:none;">Terms &amp; Conditions</a>,
              <a href="/legal.html#privacy" target="_blank" style="color:#00e5a0; text-decoration:none;">Privacy Policy</a>,
              <a href="/legal.html#risk" target="_blank" style="color:#00e5a0; text-decoration:none;">Risk Disclosure</a>,
              <a href="/legal.html#kyc" target="_blank" style="color:#00e5a0; text-decoration:none;">KYC / AML Policy</a>, and
              <a href="/legal.html#payout" target="_blank" style="color:#00e5a0; text-decoration:none;">Payout Policy</a>.
              I understand that CryptoProp operates a simulated trading environment and payouts are discretionary.
            </span>
          </label>
        </div>
        <button class="btn primary" id="signupBtn" style="margin-top:12px; width:100%;">Create account</button>
        <div class="tiny muted" id="signupMsg" style="margin-top:10px;"></div>
        <div id="verifyBox" style="display:none; margin-top:14px;">
          <div class="muted small">Enter the verification code sent to your email.</div>
          <input class="input" id="verifyCode" placeholder="ABC123" style="margin-top:8px; max-width:180px;" />
          <button class="btn" id="verifyBtn" style="margin-top:8px;">Verify email</button>
          <div class="tiny muted" id="verifyMsg" style="margin-top:8px;"></div>
        </div>
      </div>



    </div>
  </div>

  <script>
    function toggleVis(id, btn) {
      const el = document.getElementById(id);
      if (!el) return;
      const isPassword = el.type === "password";
      el.type = isPassword ? "text" : "password";
      btn.textContent = isPassword ? "\uD83D\uDE48" : "\uD83D\uDC41";
    }
  </script>
  <script type="module" src="/auth.js"></script>
</body>
</html>
